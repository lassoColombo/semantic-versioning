name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.113.1'

      - name: Install nutest
        run: |
          git clone https://github.com/vyadh/nutest.git nutest
          git -C nutest checkout c701a1114fff787453259b5563ab21e0afa5768d

      - name: Run tests
        run: |
          nu -c "use ./nutest/nutest; nutest run-tests --path tests --fail --report { type: 'junit', path: 'report.xml' }"

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml
